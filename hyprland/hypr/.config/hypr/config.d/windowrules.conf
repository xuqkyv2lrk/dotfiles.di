windowrule2 = center, class:.*, floating:1

# Remove blur from around the menus
windowrule2 = noblur,class:^()$,title:^()$

# Fix some dragging issues with XWayland
windowrule2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# 1Password
windowrule2 = float, class:^(1Password)$
windowrule2 = size 1200 800, class:^(1Password)$, floating:1
windowrule2 = center, class:^(1Password)$, floating:1

# Bitwarden
windowrule2 = float, class:^(Bitwarden)$
windowrule2 = size 1200 800, class:^(Bitwarden)$, floating:1
windowrule2 = center, class:^(Bitwarden)$, floating:1

# btop
windowrule2 = float, class:^(monitor)$
windowrule2 = move 100%-w-10 35, class:^(monitor)$
windowrule2 = size 1000 606, class:^(monitor)$

# pavucontrol
windowrule2 = opacity 0.80 0.80,class:^(org.pulseaudio.pavucontrol)$
windowrule2 = float, class:^(org.pulseaudio.pavucontrol)$
windowrule2 = size 645 425, class:^(org.pulseaudio.pavucontrol)$
windowrule2 = move 100%-w-10 35, class:^(org.pulseaudio.pavucontrol)$

# nmtui
windowrule2 = float, class:^(nmtui)$
windowrule2 = move 100%-w-10 35, class:^(nmtui)$

# bluetui
windowrule2 = float, class:^(bluetui)$
windowrule2 = move 100%-w-10 35, class:^(bluetui)$

# lxqt-polkit
windowrule2 = float, class:^(lxqt-policykit-agent)$
windowrule2 = size 150 150, class:^(lxqt-policykit-agent)$

# rog-control-center
windowrule2 = float, class:^(rog-control-center)$
windowrule2 = size 150 150, class:^(rog-control-center)$
